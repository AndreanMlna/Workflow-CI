name: MLflow CI & Docker Build

# Trigger otomatis setiap kali ada push ke branch main
on:
  push:
    branches:
      - main
      - master

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install MLflow & Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas scikit-learn

    - name: Jalankan Pelatihan Model via MLProject
      run: |
        cd MLProject
        # Menggunakan env-manager=local untuk mempercepat CI dengan pip yang sudah ada
        mlflow run . --env-manager=local

    # SYARAT SKILLED/ADVANCE 1: Menyimpan Artefak ke GitHub
    - name: Upload MLflow Artifacts ke GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-model-artifacts
        path: MLProject/mlruns/

    # SYARAT ADVANCE 2: Login ke Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # SYARAT ADVANCE 3: Build & Push Docker Image menggunakan MLflow
    - name: Build dan Push Docker Image
      run: |
        cd MLProject
        
        # Membaca Run ID dari file yang dihasilkan oleh modelling.py
        RUN_ID=$(cat run_id.txt)
        DOCKER_IMAGE="${{ secrets.DOCKER_USERNAME }}/ecommerce-churn-model:latest"
        
        echo "Membangun Docker Image untuk model (Run ID: $RUN_ID)..."
        # Perintah wajib dari rubrik: mlflow build-docker
        mlflow models build-docker -m "runs:/$RUN_ID/model" -n $DOCKER_IMAGE
        
        echo "Mengunggah Docker Image ke Docker Hub..."
        docker push $DOCKER_IMAGE